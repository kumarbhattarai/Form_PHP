<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-vh-100 min-h-screen m-0 font-sans">
    <form id="myForm" action="index.php" method="POST" enctype="multipart/form-data" class="bg-white p-6 rounded-lg shadow-md w-80 flex flex-col gap-4">
        <input type="hidden" name="utm_source" id="utm_source" />
        <input type="hidden" name="utm_medium" id="utm_medium" />
        <input type="hidden" name="city" id="city" />
        <input type="hidden" name="country" id="country" />
        <input type="hidden" name="ip" id="ip" />

        <input type="text" name="user_name" id="user_name" placeholder="Enter your name" required class="p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        <div class="flex flex-col">
            <input type="tel" name="phone" id="phone" placeholder="9800000001" required class="p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <span id="phoneError" class="text-red-500 text-xs mt-1 hidden">Invalid 10-digit phone number.</span>
        </div>
        
        <div class="flex flex-col">
            <input type="email" name="user_email" id="user_email" placeholder="Enter your email" required class="p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <span id="emailError" class="text-red-500 text-xs mt-1 hidden">Invalid email address.</span>
        </div>

        <input type="file" class="p-2 text-sm text-gray-600 cursor-pointer border border-gray-300 w-[70%]" name="user_file" id="user_file" placeholder="Choose" required  >
        
        <button type="submit" id="submitBtn" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition-colors cursor-pointer disabled:bg-gray-400">Submit</button>
        <div id="statusMsg" class="text-sm font-medium hidden"></div>
    </form>

    <script>
        function getParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function setCookie(name, value, days) {
            if (!value) return;
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + value + "; expires=" + date.toUTCString() + "; path=/";
        }

        function getCookie(name) {
            const cookies = document.cookie.split("; ");
            for (let i = 0; i < cookies.length; i++) {
                let parts = cookies[i].split("=");
                if (parts[0] === name) return parts[1];
            }
            return "";
        }

        async function fetchLocation() {
            try {
                const response = await fetch("https://ipapi.co/json/");
                const data = await response.json();
                console.log(data)
                const city = data.city || "Unknown";
                const country = data.country_name || "Unknown";
                const ip = data.ip || "Unknown";

                document.getElementById("city").value = city;
                document.getElementById("country").value = country;
                document.getElementById("ip").value = ip;

                setCookie("user_city", city, 1);
                setCookie("user_country", country, 1);
                setCookie("user_ip", ip, 1);
            } catch (error) {
                console.error("Location error:", error);
            }
        }

        async function validateForm(event) {
            if (event) event.preventDefault();
            
            const form = document.getElementById("myForm");
            const email = document.getElementById("user_email").value;
            const phone = document.getElementById("phone").value;
            const statusMsg = document.getElementById("statusMsg");
            const submitBtn = document.getElementById("submitBtn");
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRegex = /^\d{10}$/;
            let isValid = true;

            if (!emailRegex.test(email)) {
                document.getElementById("emailError").style.display = "block";
                isValid = false;
            } else {
                document.getElementById("emailError").style.display = "none";
            }

            if (!phoneRegex.test(phone)) {
                document.getElementById("phoneError").style.display = "block";
                isValid = false;
            } else {
                document.getElementById("phoneError").style.display = "none";
            }

            if (isValid) {
                submitBtn.disabled = true;
                statusMsg.textContent = "Submitting...";
                statusMsg.className = "text-sm font-medium text-blue-600 block";

                const formData = new FormData(form);
                try {
                    const response = await fetch("index.php", {
                        method: "POST",
                        body: formData
                    });
                    const result = await response.json();

                    if (result.status === "success") {
                        statusMsg.textContent = result.message;
                        statusMsg.className = "text-sm font-medium text-green-600 block";
                        setTimeout(() => {
                            window.location.href = "index2.php";
                        }, 3000);
                    } else {
                        statusMsg.textContent = result.message;
                        statusMsg.className = "text-sm font-medium text-red-600 block";
                        submitBtn.disabled = false;
                    }
                } catch (error) {
                    statusMsg.textContent = "An error occurred. Please try again.";
                    statusMsg.className = "text-sm font-medium text-red-600 block";
                    submitBtn.disabled = false;
                }
            }

            return false;
        }

        document.getElementById("myForm").onsubmit = validateForm;

        window.onload = function () {
            let utm_source = getParam("utm_source") || getCookie("utm_source");
            let utm_medium = getParam("utm_medium") || getCookie("utm_medium");

            if (getParam("utm_source")) setCookie("utm_source", utm_source, 1);
            if (getParam("utm_medium")) setCookie("utm_medium", utm_medium, 1);

            document.getElementById("utm_source").value = utm_source;
            document.getElementById("utm_medium").value = utm_medium;
            document.getElementById("city").value = getCookie("user_city");
            document.getElementById("country").value = getCookie("user_country");
            document.getElementById("ip").value = getCookie("user_ip");

            fetchLocation();
        };
    </script>
</body>
</html>
